<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚽ Quiniela Mundial 2026</title>
<style>
/* ── Paleta Entelar ── */
:root {
  --teal:       #2899A0;   /* dominante: títulos sección, texto botones, líneas */
  --teal-light: #D6EEF0;   /* fill botones, fondo panel */
  --teal-mid:   #8ECDD1;   /* separadores */
  --navy:       #2B2D3F;   /* texto principal, títulos en caps */
  --gray2:      #5A6270;   /* subtítulos, cuerpo */
  --gray3:      #8E97A3;   /* labels pequeños, metadatos */
  --border-c:   #D5D9DE;   /* bordes, separadores */
  --bg:         #F7F8FA;   /* fondo general */
  --white:      #FFFFFF;
  --danger:     #C62828;
  --success:    #2E7D32;
  --radius:     10px;
  /* aliases */
  --text:  var(--navy);
  --muted: var(--gray3);
  --card:  var(--white);
  --gold:  var(--teal);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--navy); font-family:'Calibri','Trebuchet MS',Arial,sans-serif; min-height:100vh; }

/* ── header ── */
#header {
  background:var(--navy);
  border-bottom:3px solid var(--teal);
  padding:14px 16px;
}
#header h1 {
  text-align:center; color:var(--white);
  font-family:'Trebuchet MS',Arial,sans-serif;
  font-size:1.2rem; letter-spacing:.12em;
  text-transform:uppercase;
}
#header h1 span { color:var(--teal-mid); }
#header p  { text-align:center; color:var(--gray3); font-size:.7rem; margin-top:3px; }
#nav { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; margin-top:10px; }

/* ── tabs ── */
.tab-btn {
  padding:6px 13px; border-radius:20px; border:none; cursor:pointer;
  font-size:.74rem; font-family:'Calibri',Arial,sans-serif; font-weight:600;
  background:rgba(255,255,255,.08); color:var(--gray3);
  transition:all .2s;
}
.tab-btn.active { background:var(--teal); color:var(--white); }
.tab-btn:hover:not(.active) { background:rgba(40,153,160,.15); color:var(--teal-mid); }

/* ── layout ── */
#content { padding:14px; max-width:820px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; }

/* ── card ── */
.card {
  background:var(--white); border:1px solid var(--border-c);
  border-radius:var(--radius); padding:14px; margin-bottom:12px;
  box-shadow:0 1px 4px rgba(43,45,63,.06);
}
.card-title {
  color:var(--teal); font-weight:700; margin-bottom:10px;
  font-size:.9rem; font-family:'Trebuchet MS',Arial,sans-serif;
  text-transform:uppercase; letter-spacing:.06em;
  padding-bottom:6px; border-bottom:1px solid var(--teal-light);
}

/* ── group tabs ── */
.group-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
.g-btn {
  padding:5px 11px; border-radius:16px; border:1px solid var(--border-c);
  cursor:pointer; font-size:.72rem; font-family:'Calibri',Arial,sans-serif; font-weight:600;
  background:var(--white); color:var(--gray2); transition:all .2s;
}
.g-btn.active { background:var(--teal); color:var(--white); border-color:var(--teal); }
.g-btn.done   { border-color:var(--success); color:var(--success); }
.g-btn.active.done { background:var(--teal); color:var(--white); }

/* ── table ── */
table { width:100%; border-collapse:collapse; font-size:.8rem; }
th {
  padding:6px 4px; text-align:left; color:var(--gray3);
  border-bottom:2px solid var(--teal-light);
  font-family:'Trebuchet MS',Arial,sans-serif; font-size:.72rem;
  text-transform:uppercase; letter-spacing:.05em;
}
td { padding:8px 4px; border-bottom:1px solid var(--border-c); color:var(--gray2); }
.tc { text-align:center; }
.pts { font-weight:700; color:var(--teal); }
tr.q-top { background:rgba(40,153,160,.05); }
tr:hover td { background:rgba(40,153,160,.03); }

/* ── match row ── */
.match-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; background:var(--bg); border-radius:6px;
  margin-bottom:5px; border:1px solid var(--border-c); transition:border .2s;
}
.match-row.played { border-color:var(--teal-mid); background:rgba(40,153,160,.04); }
.team-name  { flex:1; font-size:.82rem; color:var(--navy); }
.team-home  { text-align:right; }
.score-box  { margin:0 10px; font-weight:700; min-width:60px; text-align:center; }
.score-live { color:var(--teal); font-size:1.1rem; }
.score-pending { color:var(--gray3); font-size:.72rem; }
.match-date { font-size:.65rem; color:var(--gray3); margin-bottom:5px; }

/* ── inputs ── */
input[type=text], input[type=password] {
  width:100%; padding:9px 12px; border-radius:7px;
  border:1px solid var(--border-c); background:var(--white);
  color:var(--navy); font-size:.9rem; outline:none;
  font-family:'Calibri',Arial,sans-serif;
  transition:border .2s;
}
input[type=text]:focus, input[type=password]:focus { border-color:var(--teal); }
.score-input {
  width:44px; padding:6px; text-align:center; border-radius:5px;
  border:1px solid var(--border-c); background:var(--white);
  color:var(--navy); font-size:1rem; font-weight:700;
  -moz-appearance:textfield; transition:border .2s;
}
.score-input:focus { border-color:var(--teal); outline:none; }
.score-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.score-input:disabled { background:var(--bg); color:var(--gray3); }

/* ── buttons ── */
.btn {
  padding:10px 16px; border-radius:8px; border:none; cursor:pointer;
  font-weight:700; font-size:.88rem; transition:all .2s;
  font-family:'Calibri',Arial,sans-serif;
}
.btn-gold  { background:var(--teal); color:var(--white); width:100%; margin-top:8px; }
.btn-gold:hover { background:#1e7a80; }
.btn-blue  { background:var(--teal-light); color:var(--teal); border:1px solid var(--teal-mid); }
.btn-blue:hover { background:var(--teal-mid); color:var(--white); }
.btn-green { background:#e8f5e9; color:var(--success); border:1px solid #a5d6a7; }
.btn-green:hover { background:var(--success); color:var(--white); }
.btn-red   { background:#fce4e4; color:var(--danger); border:1px solid #ef9a9a; }
.btn-red:hover { background:var(--danger); color:var(--white); }
.btn-sm {
  padding:5px 12px; font-size:.74rem; border-radius:16px; border:1px solid var(--border-c);
  cursor:pointer; background:var(--white); color:var(--gray2);
  font-family:'Calibri',Arial,sans-serif; font-weight:600; transition:all .2s;
}
.btn-sm:hover { border-color:var(--teal); color:var(--teal); }
.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }

/* ── badges ── */
.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.7rem; font-weight:700; }
.badge-green { background:#e8f5e9; color:var(--success); border:1px solid #a5d6a7; }
.badge-blue  { background:var(--teal-light); color:var(--teal); border:1px solid var(--teal-mid); }
.badge-red   { background:#fce4e4; color:var(--danger); border:1px solid #ef9a9a; }

/* ── prize ── */
.prize-pool { text-align:center; padding:16px; }
.prize-amount { font-size:2.8rem; font-weight:700; color:var(--teal); line-height:1.1;
  font-family:'Trebuchet MS',Arial,sans-serif; }
.prize-sub  { font-size:.72rem; color:var(--gray3); margin-bottom:12px; }
.prize-grid { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
.prize-item { background:var(--teal-light); padding:10px 18px; border-radius:8px;
  text-align:center; border:1px solid var(--teal-mid); }
.prize-place { font-size:.85rem; margin-bottom:2px; }
.prize-val  { font-weight:700; font-size:1.1rem; color:var(--teal); }

/* ── stats grid ── */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.stat-card {
  background:var(--white); border:1px solid var(--border-c);
  border-radius:var(--radius); text-align:center; padding:12px;
  box-shadow:0 1px 4px rgba(43,45,63,.06);
}
.stat-icon { font-size:1.4rem; }
.stat-val  { font-size:1.5rem; font-weight:700; font-family:'Trebuchet MS',Arial,sans-serif; }
.stat-lbl  { font-size:.68rem; color:var(--gray3); text-transform:uppercase; letter-spacing:.05em; }

/* ── jornada header ── */
.jornada-hdr {
  font-size:.68rem; color:var(--teal); text-transform:uppercase;
  letter-spacing:.1em; margin-bottom:8px; margin-top:14px;
  font-family:'Trebuchet MS',Arial,sans-serif; font-weight:700;
  padding-left:2px; border-left:3px solid var(--teal-light); padding-left:6px;
}

/* ── sim map ── */
.sim-row {
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  background:var(--bg); border-radius:6px; margin-bottom:4px;
  font-size:.8rem; border:1px solid var(--border-c);
}
.sim-liga  { flex:2; color:var(--gray2); }
.sim-score { min-width:42px; text-align:center; font-weight:700; color:var(--teal);
  background:var(--teal-light); border-radius:4px; padding:1px 6px; }
.sim-wc    { flex:2; color:var(--teal); font-weight:600; }
.sim-arrow { color:var(--teal-mid); }

/* ── loading ── */
#loading { display:flex; align-items:center; justify-content:center;
  min-height:80vh; flex-direction:column; gap:12px; }
.spin { font-size:3rem; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── reglas ── */
.rule-block { margin-bottom:18px; }
.rule-title {
  color:var(--navy); font-weight:700; margin-bottom:8px;
  border-bottom:2px solid var(--teal-light); padding-bottom:5px;
  font-family:'Trebuchet MS',Arial,sans-serif; text-transform:uppercase;
  font-size:.82rem; letter-spacing:.06em;
}
.rule-body  { line-height:1.9; font-size:.84rem; color:var(--gray2); }
.rule-body p { margin-bottom:4px; }

/* ── responsive ── */
@media(max-width:480px) {
  .prize-amount { font-size:2.2rem; }
  .stats-grid { grid-template-columns:repeat(3,1fr); gap:5px; }
  .stat-val { font-size:1.2rem; }
  .btn-grid { grid-template-columns:1fr; }
}

.msg { padding:10px; border-radius:7px; font-size:.82rem; margin-bottom:10px; text-align:center; font-weight:600; }
.msg-ok   { background:#e8f5e9; color:var(--success); border:1px solid #a5d6a7; }
.msg-err  { background:#fce4e4; color:var(--danger);  border:1px solid #ef9a9a; }

// Proxy CORS para Apps Script
async function apiFetch(url) {
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const r = await fetch(proxy);
  const d = await r.json();
  return JSON.parse(d.contents);
}

async function loadData() {
  try {
    const raw = await apiFetch(`${SCRIPT_URL}?action=all`);
    S.data = {
      quinielas:    raw.quinielas    || {},
      resultados:   raw.resultados   || {},
      participants: raw.participants || [],
      simMapping:   raw.simMapping   || [],
    };
  } catch(e) {
    console.error("Error cargando datos:", e);
    S.data = { quinielas:{}, resultados:{}, participants:[], simMapping:[] };
  }
}

async function saveQuiniela(nombre, preds) {
  try {
    const params = new URLSearchParams({ action:"saveQuiniela", nombre, preds: JSON.stringify(preds) });
    const d = await apiFetch(`${SCRIPT_URL}?${params}`);
    return !!d.ok;
  } catch(e) { console.error(e); return false; }
}

async function adminAction(action) {
  return apiFetch(`${SCRIPT_URL}?action=${action}&pass=${ADMIN_PASS}`);
}

// ═══════════════════════════════════════════════════════════
//  CÁLCULOS
// ═══════════════════════════════════════════════════════════
function res(h, a) { return h > a ? "L" : a > h ? "V" : "E"; }

function calcPts(pred, score) {
  if (!score?.played || pred?.h == null || pred?.a == null) return null;
  if (pred.h === score.h && pred.a === score.a) return 3;
  if (res(pred.h, pred.a) === res(score.h, score.a)) return 1;
  return 0;
}

function calcStandings() {
  const { quinielas, resultados, participants } = S.data;
  return participants.map(name => {
    let pts=0, exact=0, correct=0;
    MATCHES.forEach(m => {
      const p = calcPts(quinielas[name]?.[m.id], resultados[m.id]);
      if (p === 3) { pts+=3; exact++; correct++; }
      else if (p === 1) { pts+=1; correct++; }
    });
    return { name, pts, exact, correct };
  }).sort((a,b) => b.pts-a.pts || b.exact-a.exact || b.correct-a.correct);
}

function calcGroupTable(g) {
  const tbl = {};
  GROUP_TEAMS[g].forEach(t => {
    tbl[t] = { t, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 };
  });
  MATCHES.filter(m => m.g === g).forEach(m => {
    const s = S.data.resultados[m.id];
    if (!s?.played) return;
    const H = tbl[m.h], A = tbl[m.a];
    H.pj++; A.pj++; H.gf+=s.h; H.gc+=s.a; A.gf+=s.a; A.gc+=s.h;
    if (s.h > s.a) { H.g++; H.pts+=3; A.p++; }
    else if (s.a > s.h) { A.g++; A.pts+=3; H.p++; }
    else { H.e++; A.e++; H.pts++; A.pts++; }
  });
  return Object.values(tbl)
    .sort((a,b) => b.pts-a.pts || (b.gf-b.gc)-(a.gf-a.gc) || b.gf-a.gf);
}

    <tr style="background:${i<2?'rgba(40,153,160,.07)':i===2?'rgba(40,153,160,.03)':'transparent'}">

      <td class="tc">${r.g}</td>

      <td class="tc">${r.p}</td>
      <td class="tc">${r.gf-r.gc>0?'+':''}${r.gf-r.gc}</td>
      <td class="tc pts">${r.pts}</td>

  const matchRows = [1,2,3].map(md => {
    const ms = matches.filter(m => m.md === md);

  return `
  <div class="group-tabs">
    ${GROUPS.map(gr=>`<button class="g-btn ${gr===g?'active':''}" data-ggroup="${gr}">Grupo ${gr}</button>`).join("")}

  </div>

}

function renderQFill() {
  const g = S.qGroup;

  const matchForms = [1,2,3].map(md => {

      const s    = S.data.resultados[m.id];

      const badgeHtml = (s?.played && pts != null)
        ? `<span class="badge badge-${pts===3?'green':pts===1?'blue':'red'}">${pts===3?'✓✓ 3p':pts===1?'✓ 1p':'✗ 0p'}</span>` : "";
      return `

  return `

  <div id="q-msg"></div>`;
}

  ["dashboard","grupos","quiniela","reglas","admin"].forEach(id => {

  // Grupos tabs
  document.querySelectorAll("[data-ggroup]").forEach(btn => {
    btn.addEventListener("click", () => { S.gGroup = btn.dataset.ggroup; render(); });

  // Quiniela home
  const btnOpenQ = document.getElementById("btn-open-q");
  if (btnOpenQ) btnOpenQ.addEventListener("click", () => {
    const name = document.getElementById("q-name")?.value?.trim();
    if (!name) return showMsg("q-msg", "Ingresa tu nombre", "err");
    S.qUser  = name;
    S.qPreds = { ...(S.data.quinielas[name] || {}) };
    S.qMode  = "fill";
    render();
  });

  document.querySelectorAll("[data-qedit]").forEach(btn => {
    btn.addEventListener("click", () => {
      const name  = btn.dataset.qedit;
      S.qUser     = name;
      S.qPreds    = { ...(S.data.quinielas[name] || {}) };
      S.qMode     = "fill";
      render();
    });
  });

  // Quiniela fill
  const btnBack = document.getElementById("btn-back-q");
  if (btnBack) btnBack.addEventListener("click", () => { S.qMode = "home"; render(); });

  document.querySelectorAll("[data-qgroup]").forEach(btn => {
    btn.addEventListener("click", () => { S.qGroup = btn.dataset.qgroup; render(); });
  });

  // Score inputs
  document.querySelectorAll(".score-input").forEach(inp => {
    inp.addEventListener("change", () => {
      const mid  = inp.dataset.mid;
      const side = inp.dataset.side;
      const val  = parseInt(inp.value);
      if (isNaN(val) || val < 0 || val > 20) return;
      if (!S.qPreds[mid]) S.qPreds[mid] = {};
      S.qPreds[mid][side] = val;
    });
  });

  const btnSaveQ = document.getElementById("btn-save-q");
  if (btnSaveQ) btnSaveQ.addEventListener("click", async () => {
    btnSaveQ.disabled = true;
    btnSaveQ.textContent = "⏳ Guardando…";
    const ok = await saveQuiniela(S.qUser, S.qPreds);
    if (ok) {
      // Actualizar local
      S.data.quinielas[S.qUser] = { ...S.qPreds };
      if (!S.data.participants.includes(S.qUser)) S.data.participants.push(S.qUser);
      btnSaveQ.textContent = "✅ ¡Guardado!";
      btnSaveQ.style.background = "#2899A0";
      setTimeout(() => { btnSaveQ.disabled=false; btnSaveQ.textContent="💾 Guardar Quiniela"; btnSaveQ.style.background=""; }, 2500);
    } else {
      btnSaveQ.textContent = "❌ Error — intenta de nuevo";
      setTimeout(() => { btnSaveQ.disabled=false; btnSaveQ.textContent="💾 Guardar Quiniela"; }, 2000);
    }
  });

  // Admin login
  const btnLogin = document.getElementById("btn-admin-login");
  if (btnLogin) {
    document.getElementById("admin-pass")?.addEventListener("keydown", e => {
      if (e.key === "Enter") btnLogin.click();
    });
    btnLogin.addEventListener("click", () => {
      const p = document.getElementById("admin-pass")?.value;
      if (p === ADMIN_PASS) { S.adminOk = true; render(); }
      else { S.adminMsg = "❌ Contraseña incorrecta"; S.adminMsgType = "err"; render(); }
    });
  }

  // Admin buttons
  const btnSim = document.getElementById("btn-sim");
  if (btnSim) btnSim.addEventListener("click", async () => {
    btnSim.disabled = true; btnSim.textContent = "⏳ Aplicando…";
    const r = await adminAction("simulate");
    S.adminMsg     = r.ok ? `✅ ${r.msg}` : `❌ ${r.error}`;
    S.adminMsgType = r.ok ? "ok" : "err";
    await loadData();
    render();
  });

  const btnReset = document.getElementById("btn-reset");
  if (btnReset) btnReset.addEventListener("click", async () => {
    if (!confirm("¿Resetear simulación?")) return;
    btnReset.disabled = true; btnReset.textContent = "⏳ Reseteando…";
    const r = await adminAction("resetSim");
    S.adminMsg     = r.ok ? `✅ ${r.msg}` : `❌ ${r.error}`;
    S.adminMsgType = r.ok ? "ok" : "err";
    await loadData();
    render();
  });

  const btnFetch = document.getElementById("btn-fetch-wc");
  if (btnFetch) btnFetch.addEventListener("click", async () => {
    btnFetch.disabled = true; btnFetch.textContent = "⏳ Consultando ESPN…";
    const r = await adminAction("fetchWC");
    S.adminMsg     = r.ok ? `✅ ${r.msg}` : `❌ ${r.error}`;
    S.adminMsgType = r.ok ? "ok" : "err";
    await loadData();
    render();
  });

  const btnReload = document.getElementById("btn-reload-data");
  if (btnReload) btnReload.addEventListener("click", async () => {
    btnReload.textContent = "⏳ Recargando…";
    await loadData();
    render();
  });
}

function showMsg(id, txt, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `msg msg-${type}`;
  el.textContent = txt;
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  // Nav click (before data load for tab switching)
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => { S.tab = btn.dataset.tab; render(); });
  });

  // Hash routing — acceso admin oculto: URL/#admin
  if (window.location.hash === "#admin") S.tab = "admin";

  await loadData();
  render();
})();
</script>
</body>
</html>
